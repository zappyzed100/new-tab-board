# guardrails-ci.yml — 最終防衛線: ローカルフックと同一の検査を PR / main push で必ず再実行（正本: GUARDRAILS.md §5）
#
# ローカルの git フックは原理的に迂回できる（別マシン・Web エディタ等）ため、
# checks ジョブは .pre-commit-config.yaml と全く同じ定義をそのまま再実行する
# （定義元を1つにしてローカルと CI の検査内容がドリフトしない設計）。
# `pre-commit run` は既定で pre-commit ステージのみ実行するため、
# stages: [pre-push] のテスト・解析群は BINDING の独立ジョブで明示的に回す。
#
# v2.25（G10・是正）: 上記コメントは stages: [pre-push] の抜けだけを注意していたが、
# stages: [commit-msg]（check-commit-msg）も同じく `pre-commit run --all-files` には
# 乗らず、CI に一切再生されていなかった（`pre-commit install` していない環境からの
# コミットには commit-msg 段の HARD 検査が丸ごと効かない実害があった）。
# commit-msg-history ジョブが scripts/check_commit_msg_history.py で PR 範囲のコミットを
# 1つずつ再生し、この抜け穴を塞ぐ。
#
# BINDING-SOURCE: ts-react-crx@1

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read   # 最小権限（検査は読み取りだけで足りる。書き込みが要るジョブは列側で個別に付与）

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # ハング保険（無限に待つ CI ＝最悪の出戻り — §9.1 の思想の CI 版・G11）
    steps:
      - uses: actions/checkout@v4
      # §7.1: Python 系はすべて uv 経由。Python 自体も .python-version に従い uv が自動解決
      - uses: astral-sh/setup-uv@v5
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      # フックによるファイル変更（§3.2 の再生成差分を含む）も CI では失敗として現れる
      - run: uvx pre-commit run --all-files --show-diff-on-failure

  # red-first 証明（§5・Phase 18 — v2.7）: PR 範囲の fix: の同梱テストが親コミットで
  # 赤だった（＝バグを再現していた）ことを機械証明する。未配線（言語なし出荷）では不発。
  # 決定点③は v2.9 で required に確定（Phase 21）: 違反は exit 1 でジョブが赤。仕上げに
  # ブランチ保護の required checks へ本ジョブを登録する（リポジトリ設定——Step 9 ④）。
  # 表示のみへ戻すロールバックは呼び出しに --soft を足すだけ（§5）。
  red-first:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20   # ハング保険（checks と同じ — G11。1テストの保険はスクリプト側 300 秒）
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # PR 範囲・親コミット・worktree 復元に全履歴が必要（§5）
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: uv run scripts/check_red_first.py --base "${{ github.event.pull_request.base.sha }}"

  # commit-msg段の再生（§3.4・§5・v2.25）: check-commit-msg は pre-commit install した
  # ローカル環境でしか発火しないため、PR のコミット範囲を1つずつ一時 worktree で
  # 再現し check_commit_msg.py を無改造のまま再生する（red-first と同じ流儀）。
  commit-msg-history:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # PR 範囲・親コミット・worktree 復元に全履歴が必要（§5）
      - uses: astral-sh/setup-uv@v5
      - run: uv run scripts/check_commit_msg_history.py --base "${{ github.event.pull_request.base.sha }}"

  # ============ BINDING: 言語別テスト・解析・E2E ジョブ（ts-react-crx@1 — §5・§12.4）============
  ts-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: npx vitest run

  e2e:   # §12.4 の操作レールを PR の赤/緑へ変換（Step 8b DoD）
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: xvfb-run --auto-servernum npx playwright test
